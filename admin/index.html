<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D 管理面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <script>
    (function() {
      fetch('api/status')
        .then(function(r) { return r.json(); })
        .then(function(j) {
          if (!j.success) window.location.href = 'login.html';
        })
        .catch(function() {
          window.location.href = 'login.html';
        });
    })();
    </script>

    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a class="sidebar-logo" href="#">
                    <div class="sidebar-logo-icon">L2D</div>
                    <div class="sidebar-logo-text">Live2D <span>管理</span></div>
                </a>
                <button class="theme-toggle" onclick="App.toggleTheme()" title="切换主题">
                    <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <div class="sidebar-stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">模型</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-groups">0</div>
                    <div class="stat-label">分组</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-textures">0</div>
                    <div class="stat-label">纹理</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">分组</div>
                <div id="group-list"></div>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
                    <div class="sidebar-user-info">
                        <span class="sidebar-user-name" id="sidebar-user-name"></span>
                        <span class="sidebar-user-role" id="sidebar-user-role"></span>
                    </div>
                </div>
                <button class="sidebar-settings-btn" onclick="App.openSettings()" title="账号设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <button class="sidebar-logout-btn" onclick="App.doLogout()" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <div class="content-header">
                <h2 class="content-title">模型列表</h2>
                <div class="content-actions">
                    <button class="btn btn-icon" onclick="App.doRefresh()" title="刷新列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    </button>
                    <div class="search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="search-input" placeholder="搜索模型...">
                    </div>
                    <button class="btn btn-glow" onclick="App.showUploadModal()">上传模型</button>
                    <button class="btn btn-outline" onclick="App.showCreateModal()">添加模型</button>
                </div>
            </div>
            <div id="model-grid" class="model-grid">
                <div class="loading-spinner"><div class="spinner"></div><p>加载中...</p></div>
            </div>
        </main>
    </div>

    <div class="preview-panel" id="preview-panel">
        <div class="preview-header">
            <span class="preview-title" id="preview-model-name">预览</span>
            <button class="preview-close" onclick="Live2DPreview.closePanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="preview-canvas-wrap" id="preview-canvas-wrap">
            <div class="live2d-dialog" id="live2d-dialog">
                <div class="dialog-content" id="dialog-content"></div>
                <button class="dialog-close" onclick="Live2DPreview.hideDialog()">×</button>
            </div>
            <canvas id="live2d-canvas" width="320" height="400"></canvas>
        </div>
        <div class="preview-controls">
            <div id="skin-selector" class="skin-selector"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay"></div>

    <div class="modal" id="modal-create">
        <h3 class="modal-title">添加<span class="accent">模型</span></h3>
        <div class="form-group">
            <label class="form-label">模型名称</label>
            <input type="text" class="form-input" id="create-name" placeholder="分组/模型名">
            <div class="form-hint">使用 分组/模型名（如 Potion-Maker/Pio）或直接使用目录名（如 六初）</div>
        </div>
        <div class="form-group">
            <label class="form-label">描述</label>
            <input type="text" class="form-input" id="create-message" placeholder="模型描述信息">
        </div>
        <div class="form-group">
            <button class="btn btn-sm btn-outline" onclick="App.scanUnregistered()">浏览未注册目录</button>
            <div id="scan-result" class="scan-result" style="display:none"></div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="UI.closeModal('modal-create')">取消</button>
            <button class="btn btn-glow" onclick="App.doCreate()">添加</button>
        </div>
    </div>

    <div class="modal" id="modal-edit">
        <h3 class="modal-title">编辑<span class="accent">模型</span></h3>
        <input type="hidden" id="edit-old-name">
        <div class="form-group">
            <label class="form-label">模型名称</label>
            <input type="text" class="form-input" id="edit-new-name" placeholder="分组/模型名">
        </div>
        <div class="form-group">
            <label class="form-label">描述</label>
            <input type="text" class="form-input" id="edit-message" placeholder="模型描述信息">
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="UI.closeModal('modal-edit')">取消</button>
            <button class="btn btn-primary" onclick="App.doEdit()">保存</button>
        </div>
    </div>

    <div class="modal" id="modal-delete">
        <h3 class="modal-title">删除<span class="accent">模型</span></h3>
        <p style="color: var(--text-secondary); margin-bottom: 16px;">确定要删除 <strong id="delete-name" style="color: var(--accent-cyan)"></strong> 吗？</p>
        <label class="form-checkbox">
            <input type="checkbox" id="delete-confirm-files">
            同时删除磁盘上的模型文件
        </label>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="UI.closeModal('modal-delete')">取消</button>
            <button class="btn btn-danger" onclick="App.doDelete()">删除</button>
        </div>
    </div>

    <div class="modal" id="modal-upload">
        <h3 class="modal-title">上传<span class="accent">模型</span></h3>
        <div class="form-group">
            <label class="form-label">目标模型名称</label>
            <input type="text" class="form-input" id="upload-model-name" placeholder="分组/模型名">
            <div class="form-hint">必须使用 分组/模型名 格式，目录不存在时将自动创建</div>
        </div>
        <div class="form-group">
            <label class="form-label">文件</label>
            <div class="upload-drop-zone" id="upload-drop-zone">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p id="upload-file-label">点击或拖拽文件到此处</p>
                <p style="font-size: 11px; margin-top: 4px;">支持 .zip, .moc, .json, .mtn, .png, .jpg</p>
            </div>
            <input type="file" id="upload-file-input" style="display:none" accept=".zip,.moc,.json,.mtn,.png,.jpg">
        </div>
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-bar">
                <div class="upload-progress-fill" id="upload-progress-fill"></div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="UI.closeModal('modal-upload')">取消</button>
            <button class="btn btn-glow" id="upload-submit-btn" onclick="App.doUpload()">上传</button>
        </div>
    </div>

    <div class="modal modal-xl" id="modal-generate">
        <h3 class="modal-title">调用<span class="accent">代码</span></h3>
        <p class="modal-subtitle" id="generate-model-name"></p>
        <div class="gen-layout">
            <div class="gen-preview">
                <div class="gen-mock-page" id="gen-mock-page">
                    <div class="gen-mock-header"></div>
                    <div class="gen-mock-body">
                        <div class="gen-mock-line"></div>
                        <div class="gen-mock-line short"></div>
                        <div class="gen-mock-line"></div>
                        <div class="gen-mock-line short"></div>
                        <div class="gen-mock-line"></div>
                    </div>
                    <div class="gen-mock-model" id="gen-mock-model">
                        <div class="gen-dialog" id="gen-dialog">
                            <div class="gen-dialog-content" id="gen-dialog-content"></div>
                        </div>
                        <div class="gen-mock-model-wrap" id="gen-preview-wrap"></div>
                    </div>
                </div>
            </div>
            <div class="gen-config">
                <div class="gen-config-group">
                    <label class="gen-config-label">位置</label>
                    <div class="gen-btn-group">
                        <button class="gen-btn active" data-pos="right" onclick="App.setGenPos('right')">右下</button>
                        <button class="gen-btn" data-pos="left" onclick="App.setGenPos('left')">左下</button>
                    </div>
                </div>
                <div class="gen-config-row">
                    <div class="gen-config-group">
                        <label class="gen-config-label">水平偏移</label>
                        <input type="number" class="gen-config-input" id="gen-offset-x" value="0" min="0" max="500" onchange="App.updateGenCode()">
                    </div>
                    <div class="gen-config-group">
                        <label class="gen-config-label">垂直偏移</label>
                        <input type="number" class="gen-config-input" id="gen-offset-y" value="0" min="0" max="500" onchange="App.updateGenCode()">
                    </div>
                </div>
                <div class="gen-config-row">
                    <div class="gen-config-group">
                        <label class="gen-config-label">宽度</label>
                        <input type="number" class="gen-config-input" id="gen-width" value="300" min="100" max="800" onchange="App.updateGenCode()">
                    </div>
                    <div class="gen-config-group">
                        <label class="gen-config-label">高度</label>
                        <input type="number" class="gen-config-input" id="gen-height" value="400" min="100" max="800" onchange="App.updateGenCode()">
                    </div>
                </div>
                <div class="gen-config-group">
                    <label class="gen-config-label">缩放比例</label>
                    <div class="gen-btn-group">
                        <button class="gen-btn" data-scale="0.5" onclick="App.setGenScale(0.5)">0.5x</button>
                        <button class="gen-btn active" data-scale="1" onclick="App.setGenScale(1)">1x</button>
                        <button class="gen-btn" data-scale="1.5" onclick="App.setGenScale(1.5)">1.5x</button>
                        <button class="gen-btn" data-scale="2" onclick="App.setGenScale(2)">2x</button>
                    </div>
                </div>
                <div class="gen-config-group">
                    <label class="gen-config-label">聊天内容 <span style="color:var(--text-tertiary);font-size:11px">（每行一条消息）</span></label>
                    <textarea class="gen-config-textarea" id="gen-messages" rows="4" onchange="App.updateGenMessages()" placeholder="你好呀~&#10;今天天气真好!&#10;有什么想问的吗?&#10;欢迎来到这里~&#10;我是你的看板娘哦~"></textarea>
                </div>
                <div class="code-block">
                    <div class="code-header">
                        <span class="code-lang" id="generate-code-lang">HTML + JavaScript</span>
                        <button class="btn btn-sm btn-glow" onclick="App.copyCode()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            复制代码
                        </button>
                    </div>
                    <pre><code id="generate-code-content"></code></pre>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="App.closeGenModal()">关闭</button>
        </div>
    </div>

    <div class="modal" id="modal-settings">
        <h3 class="modal-title">账号<span class="accent">设置</span></h3>
        <div class="settings-tabs">
            <button class="settings-tab active" data-tab="profile" onclick="document.getElementById('settings-tab-profile').style.display='';document.getElementById('settings-tab-password').style.display='none';this.classList.add('active');this.nextElementSibling.classList.remove('active')">修改用户名</button>
            <button class="settings-tab" data-tab="password" onclick="document.getElementById('settings-tab-password').style.display='';document.getElementById('settings-tab-profile').style.display='none';this.classList.add('active');this.previousElementSibling.classList.remove('active')">修改密码</button>
        </div>

        <div id="settings-tab-profile">
            <div class="login-error" id="settings-error" style="display:none"></div>
            <div class="login-success" id="settings-success" style="display:none"></div>
            <form class="login-form" onsubmit="event.preventDefault();App.doUpdateProfile()" autocomplete="off" novalidate>
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <input type="password" class="form-input" id="settings-current-password" placeholder="输入当前密码验证身份" required>
                </div>
                <div class="form-group">
                    <label class="form-label">新用户名</label>
                    <input type="text" class="form-input" id="settings-new-username" placeholder="字母、数字、下划线或中文" required>
                </div>
                <button type="submit" class="btn btn-glow" style="width:100%">更新用户名</button>
            </form>
        </div>

        <div id="settings-tab-password" style="display:none">
            <div class="login-error" id="settings-pw-error" style="display:none"></div>
            <div class="login-success" id="settings-pw-success" style="display:none"></div>
            <form class="login-form" onsubmit="event.preventDefault();App.doChangePassword()" autocomplete="off" novalidate>
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <input type="password" class="form-input" id="settings-pw-current" placeholder="输入当前密码" required>
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="settings-new-password" placeholder="至少8位，包含字母和数字" required>
                </div>
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" class="form-input" id="settings-new-password-confirm" placeholder="再次输入新密码" required>
                </div>
                <button type="submit" class="btn btn-glow" style="width:100%">修改密码</button>
            </form>
        </div>
        <div class="modal-actions" style="margin-top:16px">
            <button class="btn btn-outline" onclick="UI.closeModal('modal-settings')">关闭</button>
        </div>
    </div>

    <script src="assets/js/pixi.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/live2d.min.js"></script>
    <script src="assets/js/live2dcubismcore.min.js"></script>
    <script src="assets/js/cubism4.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/live2d.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
